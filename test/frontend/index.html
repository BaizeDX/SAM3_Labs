<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAM 3 - ABC Segmentation</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Microsoft YaHei',sans-serif;background:#f5f5f5;color:#333}
.container{max-width:1500px;margin:0 auto;padding:12px}
h1{font-size:18px;margin-bottom:8px}
h1 small{font-size:12px;color:#888;font-weight:400}

/* Mode tabs */
.mode-tabs{display:flex;gap:0;margin-bottom:8px}
.mode-tab{padding:8px 20px;border:2px solid #ddd;border-radius:8px 8px 0 0;cursor:pointer;font-size:13px;font-weight:600;background:#fff;border-bottom:2px solid #ddd;transition:all .15s;margin-right:4px}
.mode-tab.active-a{border-color:#2563eb;border-bottom:2px solid #2563eb;color:#2563eb;background:#eff6ff}
.mode-tab.active-b{border-color:#16a34a;border-bottom:2px solid #16a34a;color:#16a34a;background:#f0fdf4}
.mode-tab.active-c{border-color:#dc2626;border-bottom:2px solid #dc2626;color:#dc2626;background:#fef2f2}

/* Toolbar */
.toolbar{background:#fff;border-radius:0 10px 10px 10px;padding:10px 14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);display:flex;flex-wrap:wrap;align-items:center;gap:8px}
.toolbar label{font-size:12px;font-weight:600;color:#555;display:flex;align-items:center;gap:4px}
.toolbar select,.toolbar input[type="text"]{padding:5px 8px;border:1px solid #ccc;border-radius:5px;font-size:12px}
.toolbar input[type="text"]{width:200px}
.btn{padding:6px 14px;border:none;border-radius:5px;font-size:12px;cursor:pointer;font-weight:600;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-a{background:#2563eb;color:#fff}
.btn-b{background:#16a34a;color:#fff}
.btn-c{background:#dc2626;color:#fff}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-outline{background:transparent;border:1px solid #ccc;color:#555}
.btn-outline:hover{background:#f3f4f6}

.main-grid{display:grid;grid-template-columns:1fr 350px;gap:10px}

/* Canvas */
.canvas-card{background:#fff;border-radius:10px;padding:10px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.canvas-wrapper{position:relative;display:inline-block}
#imageCanvas{border:1px solid #e5e7eb;border-radius:6px;cursor:crosshair;display:block;background:#f9fafb}
.coord-display{position:absolute;bottom:3px;left:5px;background:rgba(0,0,0,.7);color:#fff;padding:1px 6px;border-radius:3px;font-size:10px;font-family:monospace;pointer-events:none}

/* Right panel */
.side-panel{display:flex;flex-direction:column;gap:6px}
.mask-list-card{background:#fff;border-radius:10px;padding:8px 10px;box-shadow:0 1px 4px rgba(0,0,0,.08);max-height:65vh;overflow-y:auto;display:flex;flex-direction:column}
.mask-scroll{flex:1;overflow-y:auto;max-height:55vh;font-size:12px}
.mask-scroll .mask-item{padding:4px 6px;gap:4px;font-size:12px}
.mask-scroll .mask-item .mask-info .inst-id{font-size:12px}
.mask-scroll .mask-item .mask-info .mask-score{font-size:11px}
.mask-scroll .eval-checkboxes label{font-size:10px}
.mask-scroll .eval-checkboxes input{width:15px;height:15px}
.mask-list-card h3{font-size:13px;color:#555;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.mask-list-card h3 small{color:#aaa;font-weight:400}

/* Sort bar */
.sort-bar{display:flex;gap:4px;margin:4px 0;flex-wrap:wrap}
.sort-btn{padding:2px 8px;border:1px solid #ddd;border-radius:4px;font-size:10px;cursor:pointer;background:#fff;transition:all .15s}
.sort-btn:hover{background:#f3f4f6}
.sort-btn.active{background:#eef2ff;border-color:#4f46e5;color:#4f46e5}

/* Mask list */
.mask-scroll{flex:1;overflow-y:auto;max-height:380px}
.section-label{font-size:11px;font-weight:600;color:#888;padding:6px 4px 2px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center}
.mask-item{display:flex;align-items:center;padding:3px 5px;border-radius:4px;margin-bottom:1px;gap:3px;font-size:11px;cursor:pointer;transition:background .1s}
.mask-item:hover{background:#f0f0f0}
.mask-item.highlighted{background:#eef2ff;outline:1px solid #4f46e5}
.mask-item .color-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.mask-item .mask-info{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mask-item .inst-id{font-weight:600;font-size:11px}
.mask-item .mode-badge{font-size:9px;padding:1px 4px;border-radius:3px;margin-left:2px}
.mask-item .mode-a-badge{background:#eff6ff;color:#2563eb}
.mask-item .mode-b-badge{background:#f0fdf4;color:#16a34a}
.mask-item .mode-c-badge{background:#fef2f2;color:#dc2626}
.mask-item .mask-score{color:#888;margin-left:4px}
.mask-item .mask-actions{display:flex;gap:2px;flex-shrink:0}
.mask-item .mask-actions button{width:22px;height:20px;border:1px solid #e5e7eb;background:#fff;border-radius:3px;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;transition:all .1s}
.mask-item .mask-actions button.del-btn:hover{background:#fef2f2;border-color:#dc2626}
.mask-empty{color:#aaa;font-size:12px;text-align:center;padding:12px}

/* Prompt chips */
.prompt-list{display:flex;flex-wrap:wrap;gap:4px;margin:4px 0}
.prompt-chip{padding:3px 10px;border:1px solid #2563eb;border-radius:12px;font-size:11px;cursor:pointer;transition:all .15s;background:#fff;color:#2563eb}
.prompt-chip:hover{background:#eff6ff}
.prompt-chip.selected{background:#2563eb;color:#fff}

/* Push bar */
.push-bar{display:flex;gap:4px;padding:4px 0;border-top:1px solid #eee;margin-top:4px}
.hidden{display:none!important}

.status-card{background:#fff;border-radius:10px;padding:8px 12px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.status-card .status-title{font-size:11px;color:#888;margin-bottom:2px}
.status-card .status-msg{font-size:12px;color:#333;white-space:pre-wrap;max-height:60px;overflow-y:auto}

@media(max-width:900px){.main-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
<h1>SAM 3 ABC Segmentation <small>A:Text | B:Box+Multi | C:Box+Single</small></h1>

<div class="mode-tabs">
<div class="mode-tab active-a" data-mode="a" onclick="switchMode('a')">📝 A: 纯文本</div>
<div class="mode-tab" data-mode="b" onclick="switchMode('b')">🟦 B: 框+多掩码</div>
<div class="mode-tab" data-mode="c" onclick="switchMode('c')">🟥 C: 框+单掩码</div>
</div>

<div class="toolbar">
<label>Image: <select id="imgSelect"><option>--</option></select></label>
<span id="modeToolbarA"><label>Prompt: <select id="promptSelect"><option>loading</option></select></label></span>
<span id="modeToolbarBC" class="hidden" style="display:inline-flex;align-items:center;gap:6px;flex-wrap:wrap">
    <label>Text: <input type="text" id="textInput" value="swallowtail ridge" style="width:180px"></label>
    <div id="bcPromptChips" class="prompt-list" style="margin:0;display:inline-flex"></div>
</span>
    <span id="segToolbar">
    <button class="btn btn-a" id="runBtn">▶ Run A</button>
    <button class="btn btn-sm btn-outline" id="clearBtn">🗑 Clear</button>
    <button class="btn btn-sm btn-primary" id="exportBtn">💾 Export</button>
    <span id="modeIndicator" style="font-size:11px;color:#888;margin-left:8px">Mode A</span>
    </span>
    <span id="evalExportBtn" class="hidden">
    <button class="btn btn-sm btn-primary" onclick="exportEvalReport()">📊 Export Eval Report</button>
    </span>
    <button class="btn btn-sm btn-outline" style="margin-left:auto"
        onclick="toggleWorkMode()" id="workModeBtn">📊 Eval Mode</button>
    </div>

<div class="main-grid">
<div class="canvas-card">
<div class="canvas-wrapper">
<canvas id="imageCanvas" width="800" height="600"></canvas>
<div class="coord-display" id="coordDisplay">x:0 y:0</div>
<button style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,.6);color:#fff;
    border:none;border-radius:4px;padding:3px 10px;font-size:11px;cursor:pointer;
    z-index:10;" onclick="openFullSize()">🔍 Full Size</button>
<button style="position:absolute;top:4px;right:100px;background:rgba(0,0,0,.6);color:#fff;
    border:none;border-radius:4px;padding:3px 10px;font-size:11px;cursor:pointer;
    z-index:10;" id="labelsToggleBtn" onclick="toggleLabels(this)">🏷 Labels ON</button>
<button style="position:absolute;top:4px;left:4px;background:rgba(0,0,0,.6);color:#fff;
    border:none;border-radius:4px;padding:3px 10px;font-size:11px;cursor:pointer;
    z-index:10;" id="compareToggleBtn" onclick="toggleCompare(this)">👁 Compare</button>
</div>
<div id="notesDisplay" style="font-size:11px;color:#666;margin-top:4px"></div>
<div id="promptChips" class="prompt-list"></div>
</div>

<div class="side-panel">
<div class="mask-list-card">
<h3>
Masks <small id="maskCount">(0)</small>
<select id="sortSelect" style="margin-left:auto;font-size:10px;padding:2px 4px;border:1px solid #ccc;border-radius:3px">
<option value="id">Sort: ID#</option>
<option value="score">Sort: Score</option>
<option value="mode">Sort: Mode</option>
</select>
</h3>

<!-- Batch hide buttons -->
<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px">
<button class="btn btn-sm btn-outline" onclick="hideByMode('a')">Hide A</button>
<button class="btn btn-sm btn-outline" onclick="hideByMode('b')">Hide B</button>
<button class="btn btn-sm btn-outline" onclick="hideByMode('c')">Hide C</button>
<button class="btn btn-sm btn-outline" onclick="hideConfirmed()">Hide Confirmed</button>
<button class="btn btn-sm btn-outline" onclick="showAllMasks()">Show All</button>
</div>

<div class="mask-scroll" id="maskListContainer"></div>

<!-- Push to confirmed bar -->
<div class="push-bar">
<button class="btn btn-sm btn-a" id="pushBtn" onclick="pushToConfirmed()">📌 Push All Pending</button>
</div>
</div>

<div class="status-card">
<div class="status-title">Status</div>
<div class="status-msg" id="statusMsg">Ready</div>
</div>
</div>

<!-- Full-size modal -->
<div id="fullSizeModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;
    background:rgba(0,0,0,.85);z-index:9999;overflow:auto;cursor:zoom-out;
    justify-content:center;align-items:center;"
    onclick="closeFullSize()">
    <div style="position:relative;display:flex;flex-direction:column;align-items:center;padding:20px;cursor:default"
         onclick="event.stopPropagation()">
        <div style="position:fixed;top:12px;right:12px;z-index:100">
            <button style="background:#dc2626;color:#fff;border:none;border-radius:50%;
                width:36px;height:36px;font-size:20px;cursor:pointer;font-weight:bold;
                box-shadow:0 2px 8px rgba(0,0,0,.3);"
                onclick="closeFullSize()">✕</button>
        </div>
        <div style="overflow:hidden;position:relative;margin:0 auto;display:inline-block;
            border-radius:8px;box-shadow:0 4px 40px rgba(0,0,0,.5);cursor:grab;"
            id="fsZoomContainer">
            <canvas id="fullSizeCanvas" style="display:block;border-radius:8px;"></canvas>
        </div>
        <div style="text-align:center;margin-top:8px;display:flex;gap:12px;justify-content:center;font-size:12px;color:rgba(255,255,255,.6)">
            <span>🖱 Scroll to zoom · Drag to pan</span>
            <button style="background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:4px;padding:2px 10px;cursor:pointer;font-size:11px;"
                onclick="toggleFsLabels(this)">🏷 Labels ON</button>
        </div>
    </div>
</div>
</div>
</div>

<script>
const state={
    currentImageId:null, imageDataUrl:null, imgW:800, imgH:600,
    mode:'a',
    workMode:'segment', // 'segment' | 'eval'
    masks:[],        // {id,instance_id,mode,text,score,mask_data,visible,box,color,confirmed,batch,eval}
    nextMaskId:0,
    counters:{a:{},b:{},c:{}},
    isDrawBox:false, boxStart:null, boxEnd:null, currentBox:null,
    colors:['#2563eb','#16a34a','#dc2626','#f59e0b','#0891b2','#db2777','#65a30d','#ea580c','#7c3aed','#06b6d4'],
    a_prompts:[],
    showLabels:true,
    showMasks:true,
    highlightMaskId:null,
};

const canvas=document.getElementById('imageCanvas');
const ctx=canvas.getContext('2d');

function getScale(){return{sx:state.imgW/canvas.width,sy:state.imgH/canvas.height}}
function canvasToImg(cx,cy){const s=getScale();return{x:cx*s.sx,y:cy*s.sy}}
function textToKey(t){return t.replace(/ /g,'_').replace(/-/g,'_').replace(/'/g,'').replace(/"/g,'')}

function getNextId(mode,text){
    const k=textToKey(text);
    if(!state.counters[mode][k])state.counters[mode][k]=0;
    state.counters[mode][k]++;
    return `${mode.toUpperCase()}_${k}_#${String(state.counters[mode][k]).padStart(2,'0')}`;
}

function getColor(id){return state.colors[id%state.colors.length]}
function hexToRgb(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)}}
function status(m){document.getElementById('statusMsg').textContent=m}

async function apiGet(u){const r=await fetch(u);if(!r.ok)throw new Error(await r.text());return r.json()}
async function apiPost(u,d){
    const r=await fetch(u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});
    if(!r.ok)throw new Error(await r.text());return r.json();
}

// =====================================================================
// Canvas drawing
// =====================================================================
let _labelEls=[];

// Backdrop cache for box-drag performance (avoids Image() loading on every mousemove)
let _backdropCvs = null;
function getBackdropCvs() {
    if (!_backdropCvs) _backdropCvs = document.createElement('canvas');
    return _backdropCvs;
}
function cacheBackdrop() {
    const bc = getBackdropCvs();
    bc.width = canvas.width;
    bc.height = canvas.height;
    bc.getContext('2d').drawImage(canvas, 0, 0);
}
function quickRedraw() {
    const bc = getBackdropCvs();
    if (bc.width === 0 || bc.height === 0) { drawBox(); return; }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(bc, 0, 0);
    drawBox();
}

/**
 * Lightweight redraw for box-drag: blits cached backdrop, draws box overlay.
 * Called on every mousemove during box drawing — avoids Image() creation.
 */
function fullRedraw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    _labelEls.forEach(e=>e.remove());_labelEls=[];
    if(!state.imageDataUrl){drawBox();return}
    const img=new Image();
    img.onload=()=>{
        ctx.drawImage(img,0,0,canvas.width,canvas.height);
        if(!state.showMasks){drawAllLabels();cacheBackdrop();drawBox();return;}
        let hlMask=null;
        if(state.highlightMaskId!==null){
            hlMask=state.masks.find(m=>m.id===state.highlightMaskId);
        }
        // Draw unselected masks
        state.masks.forEach(m=>{
            if(!m.visible)return;
            if(hlMask&&m.id===hlMask.id)return;
            drawMaskOnCanvas(m);
        });
        // Draw highlighted mask on top (brighter)
        if(hlMask&&hlMask.visible){
            const mi=new Image();
            mi.onload=()=>{
                drawMaskImage(mi,hlMask.color,0.6);
                drawHighlightBorder(hlMask);
                drawAllLabels();
                cacheBackdrop();
                drawBox();
            };
            mi.src=hlMask.mask_data;
        } else {
            drawAllLabels();
            cacheBackdrop();
            drawBox();
        }
    };
    img.src=state.imageDataUrl;
}

function drawMaskOnCanvas(m){
    const mi=new Image();
    mi.onload=()=>drawMaskImage(mi,m.color,0.35);
    mi.src=m.mask_data;
}

function drawMaskImage(mi,colorHex,alpha){
    const tc=document.createElement('canvas');
    tc.width=state.imgW;tc.height=state.imgH;
    const tctx=tc.getContext('2d');
    tctx.drawImage(mi,0,0,state.imgW,state.imgH);
    const d=tctx.getImageData(0,0,state.imgW,state.imgH).data;
    const c=hexToRgb(colorHex);
    const out=tctx.createImageData(state.imgW,state.imgH);
    for(let i=0;i<d.length;i+=4){
        if(d[i]>128){out.data[i]=c.r;out.data[i+1]=c.g;out.data[i+2]=c.b;out.data[i+3]=Math.round(alpha*255);}
    }
    tctx.putImageData(out,0,0);
    ctx.drawImage(tc,0,0,canvas.width,canvas.height);
}

function drawHighlightBorder(m){
    // Compute centroid from mask data
    const mi=new Image();
    mi.onload=()=>{
        const tc=document.createElement('canvas');tc.width=state.imgW;tc.height=state.imgH;
        const tctx=tc.getContext('2d');tctx.drawImage(mi,0,0,state.imgW,state.imgH);
        const d=tctx.getImageData(0,0,state.imgW,state.imgH).data;
        const s=getScale();
        let sx=0,sy=0,count=0;
        let minX=state.imgW,minY=state.imgH,maxX=0,maxY=0;
        for(let y=0;y<state.imgH;y++){for(let x=0;x<state.imgW;x++){
            const idx=(y*state.imgW+x)*4;
            if(d[idx]>128){
                sx+=x;sy+=y;count++;
                if(x<minX)minX=x;if(y<minY)minY=y;if(x>maxX)maxX=x;if(y>maxY)maxY=y;
            }
        }}
        if(count>0){
            // Draw bounding box highlight
            ctx.strokeStyle='#4f46e5';ctx.lineWidth=2;
            ctx.strokeRect(minX/s.sx,minY/s.sy,(maxX-minX)/s.sx,(maxY-minY)/s.sy);
            // Draw cross at centroid
            const cx=(sx/count)/s.sx,cy=(sy/count)/s.sy;
            ctx.strokeStyle='#4f46e5';ctx.lineWidth=1.5;
            ctx.beginPath();ctx.moveTo(cx-8,cy);ctx.lineTo(cx+8,cy);ctx.moveTo(cx,cy-8);ctx.lineTo(cx,cy+8);ctx.stroke();
        }
    };
    mi.src=m.mask_data;
}

function drawBox(){
    if(!state.currentBox)return;
    const s=getScale();const[x1,y1,x2,y2]=state.currentBox;
    const cx1=x1/s.sx,cy1=y1/s.sy,cx2=x2/s.sx,cy2=y2/s.sy;
    const color=state.mode==='c'?'#dc2626':'#16a34a';
    ctx.strokeStyle=color;ctx.lineWidth=2;ctx.setLineDash([6,4]);
    ctx.strokeRect(cx1,cy1,cx2-cx1,cy2-cy1);ctx.setLineDash([]);
}

function computeCentroid(maskDataUrl){
    // Decode base64 mask PNG and compute pixel centroid
    const tc=document.createElement('canvas');
    const tctx=tc.getContext('2d');
    return new Promise(resolve=>{
        const mi=new Image();
        mi.onload=()=>{
            tc.width=mi.width;tc.height=mi.height;
            tctx.drawImage(mi,0,0);
            const d=tctx.getImageData(0,0,mi.width,mi.height).data;
            let sx=0,sy=0,count=0;
            for(let y=0;y<mi.height;y++){for(let x=0;x<mi.width;x++){
                if(d[(y*mi.width+x)*4]>128){sx+=x;sy+=y;count++;}
            }}
            resolve(count>0?{x:sx/count,y:sy/count}:null);
        };
        mi.src=maskDataUrl;
    });
}

let _fsShowLabels=true,_fsZoom=1,_fsPanX=0,_fsPanY=0,_fsDragging=false,_fsDragStartX=0,_fsDragStartY=0;

function toggleFsLabels(btn){
    _fsShowLabels=!_fsShowLabels;
    btn.textContent=_fsShowLabels?'🏷 Labels ON':'🏷 Labels OFF';
    btn.style.opacity=_fsShowLabels?'1':'0.5';
    _fsRedrawLabels();
}

function _fsRedrawLabels(){
    const fc=document.getElementById('fullSizeCanvas');
    const fctx=fc.getContext('2d');
    // Reload original image and redraw all content with current label setting
    const img=new Image();
    img.onload=()=>{
        fctx.drawImage(img,0,0);
        let drawCount=0;
        const visMasks=state.masks.filter(x=>x.visible);
        if(visMasks.length===0)return;
        visMasks.forEach(m=>{
            if(!m.visible)return;
            const mi=new Image();
            mi.onload=()=>{
                const tc=document.createElement('canvas');
                tc.width=state.imgW;tc.height=state.imgH;
                const tctx=tc.getContext('2d');
                tctx.drawImage(mi,0,0,state.imgW,state.imgH);
                const d=tctx.getImageData(0,0,state.imgW,state.imgH).data;
                const c=hexToRgb(m.color);
                const out=tctx.createImageData(state.imgW,state.imgH);
                for(let i=0;i<d.length;i+=4){
                    if(d[i]>128){out.data[i]=c.r;out.data[i+1]=c.g;out.data[i+2]=c.b;out.data[i+3]=150;}
                }
                tctx.putImageData(out,0,0);
                fctx.drawImage(tc,0,0);
                if(m._centroid&&_fsShowLabels){
                    fctx.font='bold 14px sans-serif';
                    fctx.textAlign='center';fctx.textBaseline='middle';
                    const tx=m._centroid.x,ty=m._centroid.y;
                    fctx.fillStyle='rgba(0,0,0,.7)';
                    const tw=fctx.measureText(m.instance_id).width;
                    fctx.fillRect(tx-tw/2-4,ty-10,tw+8,20);
                    fctx.fillStyle='#fff';
                    fctx.fillText(m.instance_id,tx,ty);
                }
                drawCount++;
            };
            mi.src=m.mask_data;
        });
    };
    img.src=state.imageDataUrl;
}

async function drawAllLabels(){
    if(!state.showLabels)return;
    const s=getScale();const container=document.querySelector('.canvas-wrapper');
    const positions=[]; // [{id, x, y, text}]
    for(const m of state.masks){
        if(!m.visible)continue;
        // Compute centroid if not cached
        if(!m._centroid){
            const c=await computeCentroid(m.mask_data);
            if(!c)continue;
            m._centroid=c;
        }
        const lx=m._centroid.x/s.sx;
        const ly=m._centroid.y/s.sy;
        // Offset if overlapping
        let ox=lx,oy=ly;
        let offset=12;
        while(positions.some(p=>Math.abs(p.x-ox)<18&&Math.abs(p.y-oy)<14)){
            ox=lx+((Math.random()-0.5)*offset);
            oy=ly-((Math.random()-0.5)*offset);
            offset+=6;
        }
        positions.push({id:m.id,x:ox,y:oy});
        const el=document.createElement('div');
        el.style.cssText=`left:${ox}px;top:${oy}px;position:absolute;transform:translate(-50%,-50%);
            background:rgba(0,0,0,.7);color:#fff;padding:1px 5px;border-radius:3px;
            font-size:10px;font-weight:600;pointer-events:none;z-index:10;white-space:nowrap;`;
        el.textContent=m.instance_id;
        if(state.highlightMaskId===m.id){
            el.style.background='#4f46e5';el.style.fontSize='12px';
            el.style.zIndex='11';
        }
        container.appendChild(el);_labelEls.push(el);
    }
}

// =====================================================================
// Canvas mouse events
// =====================================================================
canvas.addEventListener('mousedown',e=>{
    if(state.mode==='a')return;
    const r=canvas.getBoundingClientRect();
    state.isDrawBox=true;
    state.boxStart={x:e.clientX-r.left,y:e.clientY-r.top};
    state.boxEnd={x:e.clientX-r.left,y:e.clientY-r.top};
});
canvas.addEventListener('mousemove',e=>{
    const r=canvas.getBoundingClientRect();
    const cx=e.clientX-r.left,cy=e.clientY-r.top;
    const img=canvasToImg(cx,cy);
    document.getElementById('coordDisplay').textContent=`x:${Math.round(img.x)} y:${Math.round(img.y)}`;
    if(state.isDrawBox&&state.boxStart){
        state.boxEnd={x:cx,y:cy};
        const s=getScale();
        state.currentBox=[
            Math.min(state.boxStart.x,state.boxEnd.x)*s.sx,
            Math.min(state.boxStart.y,state.boxEnd.y)*s.sy,
            Math.max(state.boxStart.x,state.boxEnd.x)*s.sx,
            Math.max(state.boxStart.y,state.boxEnd.y)*s.sy];
        quickRedraw();
    }
});
canvas.addEventListener('mouseup',e=>{
    if(!state.isDrawBox)return;
    state.isDrawBox=false;
    const s=getScale();
    const bx1=Math.min(state.boxStart.x,state.boxEnd.x)*s.sx;
    const by1=Math.min(state.boxStart.y,state.boxEnd.y)*s.sy;
    const bx2=Math.max(state.boxStart.x,state.boxEnd.x)*s.sx;
    const by2=Math.max(state.boxStart.y,state.boxEnd.y)*s.sy;
    if(Math.abs(bx2-bx1)<5||Math.abs(by2-by1)<5){state.currentBox=null;fullRedraw();return;}
    state.currentBox=[bx1,by1,bx2,by2];
    fullRedraw();
    status(`Box: (${Math.round(bx1)},${Math.round(by1)})-(${Math.round(bx2)},${Math.round(by2)})`);
});
canvas.addEventListener('mouseleave',()=>{state.isDrawBox=false;});

document.getElementById('runBtn').addEventListener('click',async()=>{
    if(!state.currentImageId){status('Select image first.');return;}
    const mode=state.mode;
    let text='';
    if(mode==='a'){text=document.getElementById('promptSelect').value;if(!text){status('Select prompt.');return}}
    else{
        text=document.getElementById('textInput').value.trim();
        if(!text){status('Enter text.');return}
        if(!state.currentBox){status('Draw a box first.');return}
    }
    const runBtn=document.getElementById('runBtn');runBtn.disabled=true;
    status(`⏳ Running ${mode.toUpperCase()}... "${text}"`);
    try{
        let data;
        if(mode==='a')data=await apiPost('/api/segment-a',{image_id:state.currentImageId,text});
        else if(mode==='b')data=await apiPost('/api/segment-b',{image_id:state.currentImageId,text,box:state.currentBox});
        else data=await apiPost('/api/segment-c',{image_id:state.currentImageId,text,box:state.currentBox});
        const batchId=Date.now();
        (data.masks||[]).forEach(m=>{
            state.masks.push({
                id:state.nextMaskId++,instance_id:getNextId(mode,text),
                mode:mode.toUpperCase(),text,score:m.score,
                mask_data:m.mask_data,visible:true,box:state.currentBox?[...state.currentBox]:null,
                color:getColor(state.nextMaskId),confirmed:false,
                batch:batchId,
                eval:{underSeg:false,overSeg:false,boundary:false,iou:null},
            });
        });
        status(`✅ ${mode.toUpperCase()}: ${data.masks.length} masks (pending). Total: ${state.masks.length}`);
        updateMaskList();fullRedraw();
    }catch(e){status('❌ '+e.message)}
    runBtn.disabled=false;
});

// =====================================================================
// Sort masks
// =====================================================================
function getSortedMasks(){
    const order=document.getElementById('sortSelect').value;
    const copy=[...state.masks];
    if(order==='id')copy.sort((a,b)=>a.id-b.id);
    else if(order==='score')copy.sort((a,b)=>a.score-b.score);
    else if(order==='mode')copy.sort((a,b)=>a.mode.localeCompare(b.mode)||a.id-b.id);
    return copy;
}

// =====================================================================
// Mask list rendering
// =====================================================================
function updateMaskList(){
    const container=document.getElementById('maskListContainer');
    document.getElementById('maskCount').textContent=`(${state.masks.length})`;
    if(state.masks.length===0){
        container.innerHTML='<div class="mask-empty">No masks yet.</div>';return;
    }

    if(state.workMode==='eval'){
        // ====== EVAL MODE ======
        // Group by batch
        const batches={};
        state.masks.forEach(m=>{
            const b=m.batch||'0';
            if(!batches[b])batches[b]=[];
            batches[b].push(m);
        });
        const batchKeys=Object.keys(batches).sort();
        let html='<div class="mask-scroll">';
        const allStats=[]; // per-mode stats accumulator
        
        batchKeys.forEach(batchId=>{
            const items=batches[batchId];
            const modeLabel=items[0].mode;
            const timeStr=new Date(parseInt(batchId)).toLocaleTimeString();
            const modeCount={a:0,b:0,c:0};
            items.forEach(m=>modeCount[m.mode.toLowerCase()]++);
            
            html+=`<div class="section-label" style="font-size:11px;font-weight:600;color:#4f46e5">
                Batch ${timeStr} (${modeLabel}) | ${items.length} masks</div>`;
            
            // Group by component within batch
            const compGroups={};
            items.forEach(m=>{const k=m.text;if(!compGroups[k])compGroups[k]=[];compGroups[k].push(m);});
            for(const [comp,mitems] of Object.entries(compGroups)){
                html+=`<div style="padding-left:4px;border-left:2px solid #e5e7eb;margin:2px 0">`;
                html+=`<div style="font-size:10px;color:#888;padding:1px 0">${comp} (${mitems.length})</div>`;
                mitems.forEach(m=>{html+=renderEvalMaskItem(m);});
                html+=`</div>`;
            }
            // Batch stats
            const total=items.length;
            const uRate=items.filter(x=>x.eval.underSeg).length/total*100;
            const oRate=items.filter(x=>x.eval.overSeg).length/total*100;
            const bRate=items.filter(x=>x.eval.boundary).length/total*100;
            const mRate=items.filter(x=>x.eval.mislabel).length/total*100;
            html+=`<div style="font-size:10px;color:#666;padding:2px 4px 4px">
                📊 欠:${uRate.toFixed(0)}% 过:${oRate.toFixed(0)}% 边界:${bRate.toFixed(0)}% 误标:${mRate.toFixed(0)}%
                </div>`;
        });
        html+='</div>';
        // Summary table at bottom
        html+=renderEvalSummaryTable();
        container.innerHTML=html;
        
        // Bind events for eval mode
        container.querySelectorAll('.eval-under').forEach(cb=>{
            cb.addEventListener('change',e=>{
                const id=parseInt(e.target.dataset.id);
                const m=state.masks.find(x=>x.id===id);
                if(m)m.eval.underSeg=e.target.checked;
                updateMaskList();
            });
        });
        container.querySelectorAll('.eval-over').forEach(cb=>{
            cb.addEventListener('change',e=>{
                const id=parseInt(e.target.dataset.id);
                const m=state.masks.find(x=>x.id===id);
                if(m)m.eval.overSeg=e.target.checked;
                updateMaskList();
            });
        });
        container.querySelectorAll('.eval-boundary').forEach(cb=>{
            cb.addEventListener('change',e=>{
                const id=parseInt(e.target.dataset.id);
                const m=state.masks.find(x=>x.id===id);
                if(m)m.eval.boundary=e.target.checked;
                updateMaskList();
            });
        });
        container.querySelectorAll('.eval-mislabel').forEach(cb=>{
            cb.addEventListener('change',e=>{
                const id=parseInt(e.target.dataset.id);
                const m=state.masks.find(x=>x.id===id);
                if(m)m.eval.mislabel=e.target.checked;
                updateMaskList();
            });
        });
        // Visibility toggle (checkbox)
        container.querySelectorAll('.mask-vis').forEach(cb=>{
            cb.addEventListener('change',e=>{
                const id=parseInt(e.target.closest('.mask-item').dataset.id);
                const m=state.masks.find(x=>x.id===id);
                if(m){m.visible=e.target.checked;fullRedraw();}
            });
        });
        // Delete button
        container.querySelectorAll('.mask-del').forEach(btn=>{
            btn.addEventListener('click',e=>{
                e.stopPropagation();
                const id=parseInt(btn.dataset.id);
                state.masks=state.masks.filter(m=>m.id!==id);
                if(state.highlightMaskId===id)state.highlightMaskId=null;
                updateMaskList();fullRedraw();
            });
        });
        // Click mask item to highlight (same as seg mode)
        container.querySelectorAll('.mask-item').forEach(el=>{
            el.addEventListener('click',function(e){
                if(e.target.closest('input')||e.target.closest('button'))return;
                const id=parseInt(this.dataset.id);
                highlightMask(id);
            });
        });
        return;
    }

    // ====== SEGMENT MODE (existing) ======
    const hasPending=state.masks.some(m=>!m.confirmed);
    const sorted=getSortedMasks();
    const confirmed=sorted.filter(m=>m.confirmed);
    const pending=sorted.filter(m=>!m.confirmed);
    
    let html='';
    if(confirmed.length>0){
        html+=`<div class="section-label" style="cursor:pointer;user-select:none" onclick="toggleCollapse('confirmedGroup')">
            <span>▶ </span>✅ Confirmed (${confirmed.length})</div>
            <div id="confirmedGroup">`;
        const groups={};
        confirmed.forEach(m=>{const k=m.text;if(!groups[k])groups[k]=[];groups[k].push(m);});
        for(const [comp,items] of Object.entries(groups)){
            html+=`<div style="margin:2px 0;padding-left:8px;border-left:2px solid #ddd">`;
            html+=`<div style="font-size:10px;color:#888;padding:1px 0">${comp} (${items.length})</div>`;
            items.forEach(m=>{html+=renderMaskItem(m);});
            html+=`</div>`;
        }
        html+=`</div>`;
    }
    if(pending.length>0){
        html+=`<div class="section-label">⏳ Pending (${pending.length})`;
        const groups={};
        pending.forEach(m=>{const k=m.text;if(!groups[k])groups[k]=[];groups[k].push(m);});
        for(const [comp,items] of Object.entries(groups)){
            html+=`<div style="margin:2px 0;padding-left:8px;border-left:2px solid #2563eb">`;
            html+=`<div style="font-size:10px;color:#2563eb;padding:1px 0">${comp} (${items.length})</div>`;
            items.forEach(m=>{html+=renderMaskItem(m);});
            html+=`</div>`;
        }
        html+=`</div>`;
    }
    container.innerHTML=html;
    
    container.querySelectorAll('.mask-vis').forEach(cb=>{
        cb.addEventListener('change',e=>{
            const id=parseInt(e.target.closest('.mask-item').dataset.id);
            const m=state.masks.find(x=>x.id===id);
            if(m){m.visible=e.target.checked;fullRedraw();}
        });
    });
    container.querySelectorAll('.mask-del').forEach(btn=>{
        btn.addEventListener('click',e=>{
            e.stopPropagation();
            const id=parseInt(btn.dataset.id);
            state.masks=state.masks.filter(m=>m.id!==id);
            if(state.highlightMaskId===id)state.highlightMaskId=null;
            updateMaskList();fullRedraw();
        });
    });
    container.querySelectorAll('.mask-item').forEach(el=>{
        el.addEventListener('click',function(e){
            if(e.target.closest('.mask-actions')||e.target.closest('input'))return;
            const id=parseInt(this.dataset.id);
            highlightMask(id);
        });
    });
    document.getElementById('pushBtn').style.display=hasPending?'inline-block':'none';
    document.getElementById('pushBtn').textContent=hasPending?`📌 Push All Pending (${pending.length})`:'📌 Push All Pending';
}

// =====================================================================
// Full-size view
// =====================================================================
function _fsRender(container,canvas,ctx){
    canvas.style.width=state.imgW+'px';canvas.style.height=state.imgH+'px';
    canvas.style.transformOrigin='0 0';
    canvas.style.transform=`scale(${_fsZoom}) translate(${_fsPanX}px,${_fsPanY}px)`;
}
function openFullSize(){
    if(!state.imageDataUrl||state.masks.length===0){status('No masks to display in full size.');return;}
    _fsZoom=1;_fsPanX=0;_fsPanY=0;
    const modal=document.getElementById('fullSizeModal');
    const fc=document.getElementById('fullSizeCanvas');
    const container=document.getElementById('fsZoomContainer');
    fc.width=state.imgW;fc.height=state.imgH;
    const fctx=fc.getContext('2d');
    const img=new Image();
    img.onload=()=>{
        fctx.drawImage(img,0,0);
        let drawCount=0;
        const visMasks=state.masks.filter(x=>x.visible);
        if(visMasks.length===0){status('No visible masks.');_fsRender(container,fc,fctx);return;}
        visMasks.forEach(m=>{
            if(!m.visible)return;
            const mi=new Image();
            mi.onload=()=>{
                const tc=document.createElement('canvas');
                tc.width=state.imgW;tc.height=state.imgH;
                const tctx=tc.getContext('2d');
                tctx.drawImage(mi,0,0,state.imgW,state.imgH);
                const d=tctx.getImageData(0,0,state.imgW,state.imgH).data;
                const c=hexToRgb(m.color);
                const out=tctx.createImageData(state.imgW,state.imgH);
                for(let i=0;i<d.length;i+=4){
                    if(d[i]>128){out.data[i]=c.r;out.data[i+1]=c.g;out.data[i+2]=c.b;out.data[i+3]=150;}
                }
                tctx.putImageData(out,0,0);
                fctx.drawImage(tc,0,0);
                if(m._centroid&&_fsShowLabels){
                    fctx.font='bold 14px sans-serif';
                    fctx.textAlign='center';fctx.textBaseline='middle';
                    const tx=m._centroid.x,ty=m._centroid.y;
                    fctx.fillStyle='rgba(0,0,0,.7)';
                    const tw=fctx.measureText(m.instance_id).width;
                    fctx.fillRect(tx-tw/2-4,ty-10,tw+8,20);
                    fctx.fillStyle='#fff';
                    fctx.fillText(m.instance_id,tx,ty);
                }
                drawCount++;
                if(drawCount===visMasks.length)_fsRender(container,fc,fctx);
            };
            mi.src=m.mask_data;
        });
    };
    img.src=state.imageDataUrl;
    modal.style.display='flex';
    document.body.style.overflow='hidden';

    // Zoom: scroll wheel (passive:false prevents page scroll)
    container.addEventListener('wheel',e=>{
        e.preventDefault();
        const delta=e.deltaY>0?-0.15:0.15;
        const newZoom=Math.max(0.2,Math.min(10,_fsZoom+delta));
        const rect=container.getBoundingClientRect();
        const mx=e.clientX-rect.left,my=e.clientY-rect.top;
        const scale=newZoom/_fsZoom;
        _fsPanX=mx-scale*(mx-_fsPanX);
        _fsPanY=my-scale*(my-_fsPanY);
        _fsZoom=newZoom;
        _fsRender(container,fc,fctx);
    },{passive:false});
    // Also prevent page scroll when hovering the modal background
    document.getElementById('fullSizeModal').addEventListener('wheel',e=>{e.preventDefault()},{passive:false});
    // Drag to pan
    container.onmousedown=e=>{
        if(e.button!==0)return;
        _fsDragging=true;_fsDragStartX=e.clientX-_fsPanX;_fsDragStartY=e.clientY-_fsPanY;
        container.style.cursor='grabbing';
    };
    document.onmousemove=e=>{
        if(!_fsDragging)return;
        _fsPanX=e.clientX-_fsDragStartX;_fsPanY=e.clientY-_fsDragStartY;
        _fsRender(container,fc,fctx);
    };
    document.onmouseup=()=>{_fsDragging=false;container.style.cursor='grab';};
    // Double-click reset
    container.ondblclick=()=>{_fsZoom=1;_fsPanX=0;_fsPanY=0;_fsRender(container,fc,fctx);};
    _fsRender(container,fc,fctx);
}
function closeFullSize(){
    document.getElementById('fullSizeModal').style.display='none';
    document.body.style.overflow='';
}

// =====================================================================
// Eval mode: render eval mask item
// =====================================================================
function renderEvalMaskItem(m){
    const u=m.eval.underSeg?'checked':'';
    const o=m.eval.overSeg?'checked':'';
    const bo=m.eval.boundary?'checked':'';
    const mi=m.eval.mislabel?'checked':'';
    const badgeClass=`mode-${m.mode.toLowerCase()}-badge`;
    const checked=m.visible?'checked':'';
    return `<div class="mask-item${state.highlightMaskId===m.id?' highlighted':''}" data-id="${m.id}">
        <input type="checkbox" ${checked} class="mask-vis" style="width:14px;height:14px;cursor:pointer;">
        <span class="color-dot" style="background:${m.color}"></span>
        <div class="mask-info" style="flex:1;min-width:0">
            <span class="inst-id">${m.instance_id}</span>
            <span class="mode-badge ${badgeClass}">${m.mode}</span>
            <span class="mask-score">${m.score.toFixed(3)}</span>
        </div>
        <div class="eval-checkboxes" style="display:flex;gap:4px;flex-wrap:wrap;align-items:center;font-size:10px">
            <label style="font-size:10px;cursor:pointer"><input type="checkbox" class="eval-under" data-id="${m.id}" ${u}>欠</label>
            <label style="font-size:10px;cursor:pointer"><input type="checkbox" class="eval-over" data-id="${m.id}" ${o}>过</label>
            <label style="font-size:10px;cursor:pointer"><input type="checkbox" class="eval-boundary" data-id="${m.id}" ${bo}>边界</label>
            <label style="font-size:10px;cursor:pointer"><input type="checkbox" class="eval-mislabel" data-id="${m.id}" ${mi}>误标</label>
        </div>
        <button class="del-btn mask-del" data-id="${m.id}" style="width:18px;height:18px;font-size:9px;padding:0;border:1px solid #e5e7eb;background:#fff;border-radius:3px;cursor:pointer" title="Delete">🗑</button>
    </div>`;
}

// =====================================================================
// Eval: summary table
// =====================================================================
function renderEvalSummaryTable(){
    const modes=['A','B','C'];
    let html='<hr style="margin:6px 0;border:none;border-top:1px solid #ddd">';
    html+='<div style="font-size:11px;font-weight:600;color:#333;padding:2px 4px">Summary by Mode</div>';
    html+='<table style="width:100%;font-size:10px;border-collapse:collapse">';
    html+='<tr style="background:#f3f4f6"><th style="padding:2px 4px;text-align:left">模式</th>';
    html+='<th style="padding:2px 4px;text-align:right">数量</th>';
    html+='<th style="padding:2px 4px;text-align:right">欠%</th>';
    html+='<th style="padding:2px 4px;text-align:right">过%</th>';
    html+='<th style="padding:2px 4px;text-align:right">边界%</th>';
    html+='<th style="padding:2px 4px;text-align:right">误标%</th></tr>';
    
    let grandTotal=0;
    modes.forEach(modeLabel=>{
        const items=state.masks.filter(m=>m.mode===modeLabel);
        const total=items.length;
        if(total===0)return;
        grandTotal+=total;
        const uRate=items.filter(x=>x.eval.underSeg).length/total*100;
        const oRate=items.filter(x=>x.eval.overSeg).length/total*100;
        const bRate=items.filter(x=>x.eval.boundary).length/total*100;
        const mRate=items.filter(x=>x.eval.mislabel).length/total*100;
        html+=`<tr><td style="padding:2px 4px;font-weight:600">${modeLabel}</td>`;
        html+=`<td style="padding:2px 4px;text-align:right">${total}</td>`;
        html+=`<td style="padding:2px 4px;text-align:right">${uRate.toFixed(1)}</td>`;
        html+=`<td style="padding:2px 4px;text-align:right">${oRate.toFixed(1)}</td>`;
        html+=`<td style="padding:2px 4px;text-align:right">${bRate.toFixed(1)}</td>`;
        html+=`<td style="padding:2px 4px;text-align:right">${mRate.toFixed(1)}</td></tr>`;
    });
    
    // Grand total row
    if(grandTotal>0){
        const allItems=state.masks;
        const gU=allItems.filter(x=>x.eval.underSeg).length/grandTotal*100;
        const gO=allItems.filter(x=>x.eval.overSeg).length/grandTotal*100;
        const gB=allItems.filter(x=>x.eval.boundary).length/grandTotal*100;
        const gM=allItems.filter(x=>x.eval.mislabel).length/grandTotal*100;
        html+=`<tr style="background:#eef2ff;font-weight:600"><td style="padding:2px 4px">总计</td>`;
        html+=`<td style="padding:2px 4px;text-align:right">${grandTotal}</td>`;
        html+=`<td style="padding:2px 4px;text-align:right">${gU.toFixed(1)}</td>`;
        html+=`<td style="padding:2px 4px;text-align:right">${gO.toFixed(1)}</td>`;
        html+=`<td style="padding:2px 4px;text-align:right">${gB.toFixed(1)}</td>`;
        html+=`<td style="padding:2px 4px;text-align:right">${gM.toFixed(1)}</td></tr>`;
    }
    html+='</table>';
    return html;
}

// =====================================================================
// Eval: export report
// =====================================================================
function exportEvalReport(){
    const report={
        image_id:state.currentImageId,
        timestamp:new Date().toISOString(),
        total_masks:state.masks.length,
        by_mode:{},
        by_batch:{},
        detail:[],
    };
    
    // By batch
    const batches={};
    state.masks.forEach(m=>{
        const b=m.batch||'0';
        if(!batches[b])batches[b]=[];
        batches[b].push(m);
    });
    for(const [bid,items] of Object.entries(batches)){
        const total=items.length;
        report.by_batch[bid]={
            time:new Date(parseInt(bid)).toLocaleTimeString(),
            mode:items[0].mode,
            count:total,
            underSeg:items.filter(x=>x.eval.underSeg).length,
            overSeg:items.filter(x=>x.eval.overSeg).length,
            boundary:items.filter(x=>x.eval.boundary).length,
            underRate:total>0?(items.filter(x=>x.eval.underSeg).length/total*100).toFixed(1):'0',
            overRate:total>0?(items.filter(x=>x.eval.overSeg).length/total*100).toFixed(1):'0',
            boundaryRate:total>0?(items.filter(x=>x.eval.boundary).length/total*100).toFixed(1):'0',
            avgIoU:items.filter(x=>x.eval.iou!==null).length>0
                ?(items.filter(x=>x.eval.iou!==null).reduce((a,b)=>a+b.eval.iou,0)/items.filter(x=>x.eval.iou!==null).length).toFixed(1):'-',
        };
    }
    
    // By mode
    ['A','B','C'].forEach(modeLabel=>{
        const items=state.masks.filter(m=>m.mode===modeLabel);
        const total=items.length;
        if(total===0)return;
        report.by_mode[modeLabel]={
            count:total,
            underSeg:items.filter(x=>x.eval.underSeg).length,
            overSeg:items.filter(x=>x.eval.overSeg).length,
            boundary:items.filter(x=>x.eval.boundary).length,
            underRate:total>0?(items.filter(x=>x.eval.underSeg).length/total*100).toFixed(1):'0',
            overRate:total>0?(items.filter(x=>x.eval.overSeg).length/total*100).toFixed(1):'0',
            boundaryRate:total>0?(items.filter(x=>x.eval.boundary).length/total*100).toFixed(1):'0',
            avgIoU:items.filter(x=>x.eval.iou!==null).length>0
                ?(items.filter(x=>x.eval.iou!==null).reduce((a,b)=>a+b.eval.iou,0)/items.filter(x=>x.eval.iou!==null).length).toFixed(1):'-',
        };
    });
    
    // Detail
    state.masks.forEach(m=>{
        report.detail.push({
            instance_id:m.instance_id,
            mode:m.mode,
            text:m.text,
            score:m.score,
            batch:m.batch,
            eval:JSON.parse(JSON.stringify(m.eval)),
        });
    });
    
    // Download JSON
    const blob=new Blob([JSON.stringify(report,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=`eval_${state.currentImageId}_${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    status(`📊 Evaluation report downloaded (${report.detail.length} masks)`);
}
switchMode('a');
loadImages();
</script>
